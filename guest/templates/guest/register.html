<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - LocalTaskAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fe; height: 100vh; display: flex; align-items: center; }
        .register-card { background: white; padding: 40px; border-radius: 25px; width: 100%; max-width: 500px; margin: auto; }
        .btn-register { background: #6366f1; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-register:hover { background: #4f46e5; }
    </style>
</head>
<body>

<div class="container">
    <div class="register-card shadow">
        <h2 class="text-center fw-bold mb-4">Create Account</h2>
        <p class="text-center text-muted">Registering as: <strong class="text-primary">{{ role|capfirst }}</strong></p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="role" value="{{ role }}">

            <div class="mb-3">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="10-digit mobile number" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create password" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Confirm Password</label>
                <input type="password" name="confirmpassword" class="form-control" placeholder="Repeat password" required>
            </div>
            
            <button type="submit" class="btn-register">Register Now</button>
            
            <p class="text-center mt-3 small">Already have an account? <a href="{% url 'login_page' %}">Login here</a></p>
        </form>
    </div>
</div>

</body>
</html>
