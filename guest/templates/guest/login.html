<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - LocalTaskAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fe; height: 100vh; display: flex; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 25px; width: 100%; max-width: 400px; margin: auto; }
        .btn-login { background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-login:hover { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card shadow">
        <h2 class="text-center fw-bold mb-4">Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn-login">Login</button>
            
            <p class="text-center mt-3 small">New here? <a href="{% url 'register' %}?role=doer">Create an account</a></p>
        </form>
    </div>
</div>

</body>
</html>
