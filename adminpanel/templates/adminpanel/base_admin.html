<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Center | LocalTaskAI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --admin-bg: #f0fdf4;
            --sidebar-dark: #064e3b;
            --accent-color: #059669;
            --accent-hover: #10b981;
            --text-main: #1f2937;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--admin-bg);
            color: var(--text-main);
            margin: 0;
        }

        .admin-sidebar {
            width: 260px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 1000;
            background: var(--sidebar-dark);
            transition: all 0.3s;
            box-shadow: 4px 0 15px rgba(6, 78, 59, 0.15);
        }

        .brand-section {
            padding: 25px;
            font-size: 1.25rem;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-group {
            padding: 20px 0;
        }

        .admin-nav-link {
            color: #d1fae5;
            padding: 14px 25px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .admin-nav-link i { font-size: 1.2rem; margin-right: 12px; }

        .admin-nav-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
        }

        .admin-nav-link.active {
            color: #ffffff;
            background: var(--accent-color);
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
            border-radius: 0 25px 25px 0;
            margin-right: 15px;
        }

        .admin-main {
            margin-left: 260px;
            min-height: 100vh;
        }

        .admin-header {
            background: white;
            padding: 15px 40px;
            border-bottom: 1px solid #d1fae5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .content-body {
            padding: 30px 40px;
        }
    </style>
</head>
<body>

<div class="admin-sidebar">
    <div class="brand-section text-white fw-bold">
        <i class="bi bi-leaf-fill me-2" style="color: #10b981;"></i> 
        LT-AI <span class="fw-light" style="opacity: 0.8;">Admin</span>
    </div>
    
    <div class="nav-group">
        <a href="{% url 'admin_dashboard' %}" class="admin-nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
            <i class="bi bi-grid-1x2-fill"></i> Overview
        </a>

        <a href="{% url 'admin_user_management' %}" class="admin-nav-link {% if request.resolver_match.url_name == 'admin_user_management' %}active{% endif %}">
            <i class="bi bi-people-fill"></i> Users
        </a>

        <a href="{% url 'admin_task_management' %}" class="admin-nav-link {% if request.resolver_match.url_name == 'admin_task_management' %}active{% endif %}">
            <i class="bi bi-clipboard2-check-fill"></i> Tasks
        </a>

        <a href="{% url 'location_management' %}" class="admin-nav-link {% if request.resolver_match.url_name == 'location_management' %}active{% endif %}">
            <i class="bi bi-geo-alt-fill"></i> Locations
        </a>

        <a href="{% url 'skill_management' %}" class="admin-nav-link {% if request.resolver_match.url_name == 'skill_management' %}active{% endif %}">
            <i class="bi bi-tools"></i> Skills & Categories
        </a>

        <a href="#" class="admin-nav-link">
            <i class="bi bi-gear-fill"></i> Settings
        </a>
    </div>
</div>

<div class="admin-main">
    <header class="admin-header">
        <div class="search-bar">
            <h5 class="fw-bold mb-0 text-dark">System Summary</h5>
        </div>
        <div class="user-profile dropdown">
            <button class="btn border-0 rounded-pill px-3 py-2 d-flex align-items-center" 
                    style="background: #f0fdf4; color: #064e3b; font-weight: 600;" 
                    data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-2 fs-5"></i>
                {{ user.name }}
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 p-2">
                <li class="px-3 py-2 small text-muted">Role: <b>Administrator</b></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger rounded-2" href="{% url 'logout_user' %}">
                    <i class="bi bi-box-arrow-right me-2"></i> Sign Out
                </a></li>
            </ul>
        </div>
    </header>

    <div class="content-body">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
